name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Formatting (Spotless)
        run: ./gradlew spotlessCheck --stacktrace

      - name: Lint
        run: ./gradlew lint --stacktrace

      - name: Detekt
        run: ./gradlew detekt --stacktrace

      - name: Custom Checks
        run: ./gradlew checkArchitecture checkThemeLayer checkTestCoverage checkNamingConventions checkDataStoreSingleton checkPreviewCoverage

      - name: Import Boundary Check
        run: ./gradlew checkImportBoundary

      - name: Unit Tests
        run: ./gradlew test

      - name: Build Android App
        run: ./gradlew :compose-app:assembleDebug

      - name: Build Desktop App
        run: ./gradlew :compose-app:packageDistributionForCurrentOS

      - name: Compile iOS Kotlin Modules
        run: ./gradlew :compose-app:compileKotlinIosSimulatorArm64
